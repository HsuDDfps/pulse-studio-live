<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Studio</title>
    <link rel="icon" href="https://cdn.pulse-studio.live/uploads/56154781-ff58-4027-80af-0dc34390db21.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000;
            font-family: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 背景圖層處理 */
        .full-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://cdn.pulse-studio.live/uploads/efac14b9-a514-4b20-9b0f-80786fb1b21a.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            filter: blur(15px) brightness(0.4);
            transform: scale(1.1);
            z-index: 1;
        }

        /* 內容容器 */
        .content-overlay {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .logo-container {
            width: 320px; 
            max-width: 75%;
            margin-bottom: 40px;
            animation: fadeInDown 1.2s ease-out;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 25px rgba(0, 0, 0, 0.9));
        }

        /* 狀態文字排版 */
        .status-text {
            text-align: center;
            color: white;
            animation: fadeInUp 1.2s ease-out;
        }

        .status-zh {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 6px;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #fff 0%, #ccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-en {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3.5px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        footer {
            padding: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .logo-container { width: 220px; }
            .status-zh { font-size: 1.25rem; letter-spacing: 4px; }
            .status-en { font-size: 0.7rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="full-bg"></div>

    <div class="content-overlay">
        <main>
            <div class="logo-container">
                <img src="https://cdn.pulse-studio.live/uploads/aace4539-fe53-4fa4-9db1-73a928fc9ea7.png" alt="Pulse Studio">
            </div>
            
            <div class="status-text">
                <div class="status-zh">網站建置中，敬請期待</div>
                <div class="status-en">Currently Under Development</div>
            </div>
        </main>

        <footer>
            &copy; 2025-2026 Pulse Studio. All Rights Reserved.
        </footer>
    </div>

</body>
</html>
