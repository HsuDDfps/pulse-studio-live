<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 3秒後自動跳轉 -->
    <meta http-equiv="refresh" content="3;url=https://forms.gle/VHtEzgD9TMurAxSf9">
    <title>Redirecting to Registration | 正在前往報名頁面</title>
    <link rel="icon" href="https://cdn.pulse-studio.live/uploads/333a0e5a-c51c-44c1-b6d4-177ca4333f6d.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Noto+Sans+TC:wght@700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #ff4655;
            --bg-dark: #0f1923;
            --text-light: #ece8e1;
            --text-gray: #888888;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Noto Sans TC', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 延用背景與遮罩 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(15, 25, 35, 0.9), rgba(15, 25, 35, 0.9)), 
                        url('https://cdn.pulse-studio.live/uploads/1609a77a-3561-41ab-b22d-c7ddde9e6f3e.jpg') center/cover no-repeat;
            z-index: -1;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        .logo-frame img {
            width: 100%;
            max-width: 320px;
            margin-bottom: 40px;
        }

        /* 載入動畫 */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 70, 85, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            color: var(--text-gray);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .fallback {
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .fallback a {
            color: var(--primary);
            text-decoration: none;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 2px;
            transition: opacity 0.2s;
        }

        .fallback a:hover {
            opacity: 0.7;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: rgba(10, 15, 20, 0.95);
            text-align: center;
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #444;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div class="container">
    <div class="logo-frame">
        <img src="https://cdn.pulse-studio.live/uploads/333a0e5a-c51c-44c1-b6d4-177ca4333f6d.png" alt="Tournament Logo">
    </div>

    <div class="loader"></div>

    <h1>正在前往報名表單頁面...</h1>
    <p>Redirecting to Registration Form...</p>

    <div class="fallback">
        若未完成跳轉請點擊此前往 / If not redirected, <a href="https://forms.gle/VHtEzgD9TMurAxSf9">click here</a>
    </div>
</div>

<footer>
    © 2025-2026 Pulse Studio. All Rights Reserved.
</footer>

</body>
</html>
